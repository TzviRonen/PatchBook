title: PatchBook
description: Windows kernel CVE analysis — binary diffs and patch breakdowns by the kernel-cve-pipeline
url: "https://tzvironen.github.io"
baseurl: "/patchbook"
author: tzvironen

# Source repo backing the site — used to build community validation /
# suggestion links (prefilled GitHub issue & web-editor URLs). See
# _layouts/post.html and assets/patchbook.js.
github_repo: tzvironen/patchbook
github_branch: main

theme: null
markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: "highlight"

plugins:
  - jekyll-feed
  - jekyll-seo-tag

permalink: /posts/:slug/

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - scripts
  - setup.sh
  - serve.sh
